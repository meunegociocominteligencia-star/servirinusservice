name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permite disparar manualmente na aba Actions do GitHub

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
    - name: Obter Código Fonte (Checkout)
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'

    - name: Compilar APK de Teste (Debug)
      run: |
        cd android
        gradle assembleDebug

    - name: Disponibilizar APK para Download (Upload Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: severinu-service-app-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
